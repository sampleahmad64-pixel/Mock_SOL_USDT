<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Mock Terminal - SOL/USDT</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- HEADER -->
        <header class="top-nav glass">
            <div class="logo">
                <span class="nexus-brand">NEXUS</span> MOCK TERMINAL
            </div>
            <div class="ticker-info">
                <span class="symbol">SOLUSDT</span>
                <span class="live-price" id="live-price">--.--</span>
            </div>
        </header>

        <!-- MAIN LAYOUT -->
        <div class="main-content">
            
            <!-- LEFT PANEL: CHART PLACEHOLDER -->
            <div class="chart-panel glass">
                <div class="chart-placeholder">
                    <h2>Live Market Data (Binance WS)</h2>
                    <div class="big-price" id="big-price">--.--</div>
                    <div class="chart-animation"></div>
                </div>
            </div>

            <!-- RIGHT PANEL: TRADING WIDGET -->
            <div class="order-panel glass">
                <div class="order-header">Place Order</div>
                
                <div class="input-group">
                    <label>Quantity (SOL)</label>
                    <input type="number" class="order-input" placeholder="Please enter quantity" id="order-qty" value="1">
                </div>

                <div class="action-buttons">
                    <button class="long-btn" data-testid="contract-trade-quick-open-long-btn" id="btn-long">
                        Open Long
                    </button>
                    <button class="short-btn" data-testid="contract-trade-quick-open-short-btn" id="btn-short">
                        Open Short
                    </button>
                </div>
            </div>
        </div>

        <!-- BOTTOM PANEL: POSITIONS -->
        <div class="bottom-panel glass">
            <div class="tabs-header">
                <div role="tab" class="tab active">
                    <span>Open Position</span>
                </div>
                <div role="tab" class="tab">
                    <span>Open Order</span>
                </div>
            </div>
            <div class="tabs-sub-header">
                <span id="position-tab-title">Positions(0)</span>
            </div>
            
            <div class="positions-content">
                <table class="positions-table">
                    <thead>
                        <tr>
                            <th>Symbol</th>
                            <th>Size</th>
                            <th>Entry Price</th>
                            <th>Mark Price</th>
                            <th>Unrealized PNL</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="positions-body">
                        <!-- Position Rows injected here -->
                        <!-- Example format for XPATH matching:
                            <tr class="position-row position"> ... </tr>
                        -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- CONFIRMATION MODAL -->
    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-content glass">
            <div class="modal-header">
                <h3>Confirm Order</h3>
                <span class="ant-modal-close-x" id="modal-close">
                    <svg viewBox="64 64 896 896" width="1em" height="1em" fill="currentColor">
                        <path d="M563.8 512l262.5-312.9c4.4-5.2.7-13.1-6.1-13.1h-79.8c-4.7 0-9.2 2.1-12.3 5.7L511.6 449.8 295.1 191.7c-3-3.6-7.5-5.7-12.3-5.7H203c-6.8 0-10.5 7.9-6.1 13.1L459.4 512 196.9 824.9A7.95 7.95 0 00203 838h79.8c4.7 0 9.2-2.1 12.3-5.7l216.5-258.1 216.5 258.1c3 3.6 7.5 5.7 12.3 5.7h79.8c6.8 0 10.5-7.9 6.1-13.1L563.8 512z"></path>
                    </svg>
                </span>
            </div>
            <div class="modal-body" id="modal-text">
                Confirm your order details.
            </div>
            <div class="modal-footer">
                <button class="ant-btn ant-btn-primary confirm" id="btn-confirm">
                    <span>Confirm</span>
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
